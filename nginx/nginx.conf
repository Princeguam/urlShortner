upstream api {
  server api:3000;
}

server {
  listen 80;
  server_name localhost; # in production, the name will be the actual server name
  

  location / {
    proxy_pass http://api;  # references the upstream declaration above
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    # these two enable WebSocket proxying —
    # needed if you use ws anywhere

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
     # these headers tell your Node app the
    # real client IP and protocol, since the
    # request arrives from nginx not the client


    proxy_cache_bypass $http_upgrade;
    # tells nginx not to serve cached responses if webhook
  }
}