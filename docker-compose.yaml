# prettier-ignore
services:
  # ==========================================
  # API — dev overrides
  # ==========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: urlshortener-api-dev:1.0.0
    env_file:
      - .env
    container_name: urlshortener-api-dev
    ports:
      - "3000" # exposes the port only internally, not to the host machine
    volumes:
      - ./src:/app/src # bind mount — changes to src/ on your machine
        # are immediately reflected inside the container
        # without rebuilding. hot reload picks them up.
      - ./package.json:/app/package.json
        # keeps package.json in sync so the container
        # knows about dependency changes
    environment:
      NODE_ENV: development
      PORT: "${PORT:-3000}"
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672"
    command:
      ["npm", "run", "dev"] # this would likely be declared in the dockerfile so there will be no need for this in production!!
      # explicit here for clarity — matches the
      # Dockerfile CMD for the development stage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    # in production, the develop section is dropped because there's no need to actively watch files in prod.
    networks:
      - urlshortener-network
    develop:
      watch:
        - action: sync # sync file changes into the container instantly
          path: ./src
          target: /app/src
          ignore:
            - "**/*.test.*"
            - "**/__tests__/**"
        - action: rebuild # full rebuild if package.json changes
          path: ./package.json # (new dependency was added)

  # ==========================================
  # Worker — dev overrides
  # ==========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    image: urlshortener-worker-dev:1.0.0
    container_name: urlshortener-worker-dev
    command:
      ["npm", "run", "dev:worker"]
      # your dev worker script — likely nodemon or
      # ts-node watching src/worker.ts for changes.
      # add "dev:worker" to your package.json scripts:
      # "dev:worker": "nodemon src/worker.ts"
    volumes:
      - ./src:/app/src # same hot reload for the worker — change a
        # consumer file and nodemon restarts it
      - ./package.json:/app/package.json
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672"
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - "**/*.test.*"
            - "**/__tests__/**"
        - action: rebuild
          path: ./package.json
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - urlshortener-network

  # ==========================================
  # Nginx — dev overrides
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: urlshortener-nginx-dev
    ports: # these are the only two ports exposed outside
      - "80:80" # HTTP publicly exposed, nginx listens here
      - "443:443" # HTTPS publicly exposed, SSL terminates here
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - urlshortener-network

  # ==========================================
  # PostgreSQL — dev overrides
  # ==========================================
  db:
    image: postgres:18-alpine
    container_name: urlshortener-db-dev
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql
      # use /var/lib/pgsql/16/data for local db since I have the db locally
      # and use /var/lib/postgresql for production db since a new db volume will be created
    ports:
      - "5433:5432"
       # since I have postgres running locally, I'm using a different port
        # on the host to connect to postgres without colliding
        # exposes postgres to the host so you can
        # connect with TablePlus, DBeaver, or psql
        # directly from your machine
    expose:
      - "${DB_PORT}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - urlshortener-network

  # ==========================================
  # Redis — dev overrides
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: urlshortener-redis-dev
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379" # this would be dropped in production and leave only expose
        # exposes redis to the host so you can run
        # redis-cli locally to inspect keys, TTLs,
        # and rate limit counters while developing
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - urlshortener-network

  # ==========================================
  # RabbitMQ — dev overrides
  # ==========================================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: urlshortener-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    expose: # this is only used internally and not exposed outside the docker container
      - "5672"
    ports:
      - "15672:15672" # this is left open externally, but a firewall should guard it
        # management UI — open localhost:15672 in your
        # browser to inspect queues, messages, consumers,
        # and delivery rates in real time
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - urlshortener-network

volumes:
  postgres_data:
    name: urlshortener-dev-postgres-data
  redis_data:
    name: urlshortener-dev-redis-data
  rabbitmq_data:
    name: urlshortener-dev-rabbitmq-data

networks:
  urlshortener-network:
    name: urlshortener-dev-network
    driver: bridge
